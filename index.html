<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏏 Cricket Team Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">
        🏏 Cricket Team Generator
    </h1>

    <div class="card shadow-lg main-card p-4">

        <label class="fw-semibold mb-2">
            Enter Player Names (One Name Per Line)
        </label>

        <textarea
            id="players"
            rows="8"
            class="form-control"
            placeholder="Lalit&#10;Rahul&#10;Vikas&#10;Yogesh"></textarea>

        <div class="text-center mt-4">

            <button
                class="btn btn-primary"
                onclick="generateTeams()">
                ⚡ Generate Teams
            </button>

            <button
                class="btn btn-success ms-md-2 mt-2 mt-md-0"
                onclick="toss()">
                🎲 Toss
            </button>

        </div>

    </div>

    <div class="row mt-5">

        <div class="col-lg-6 mb-4">

            <div class="card shadow-lg team-card">

                <div class="card-header team-a-header text-center">
                    🔵 Team A
                </div>

                <div class="card-body" id="teamA">
                    No players yet.
                </div>

            </div>

        </div>

        <div class="col-lg-6 mb-4">

            <div class="card shadow-lg team-card">

                <div class="card-header team-b-header text-center">
                    🔴 Team B
                </div>

                <div class="card-body" id="teamB">
                    No players yet.
                </div>

            </div>

        </div>

    </div>

    <div
        id="tossResult"
        class="alert text-center mt-4 d-none">
    </div>

</div>

<script src="mine.js"></script>

</body>
</html>
